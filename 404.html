    .scroll.first {

      left: 0;

      left: 0;
      visibility: hidden;
      /* left: clamp(12rem, 50vw, 42rem); */
      animation-delay: 6s;
      
    }
    
    @keyframes scrollText {
      from   { visibility: visible;
            transform: translate(100%, 0); }
      to { 
          transform: translate(-100%, 0); }
    }
